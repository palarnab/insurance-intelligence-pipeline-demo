services:
  backend:
    build: ./backend
    container_name: iip_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # MongoDB Atlas connection string (set MONGO_URI in .env)
      - MONGO_URI=${MONGO_URI}
      - UPLOAD_DIR=/data/uploads
      - CORS_ORIGIN=*
    volumes:
      - uploads-volume:/data/uploads
    networks:
      - iip-network

  processor:
    build: ./processor
    container_name: iip_processor
    restart: unless-stopped
    environment:
      # MongoDB Atlas connection string (set MONGO_URI in .env)
      - MONGO_URI=${MONGO_URI}
      - UPLOAD_DIR=/data/uploads
      # AWS / pipeline configuration (see .env.example and docs/AWS_SETUP.md)
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-global.anthropic.claude-sonnet-4-5-20250929-v1:0}
      - USE_MOCK=${USE_MOCK:-auto}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-1000}
    volumes:
      - uploads-volume:/data/uploads
    networks:
      - iip-network

  frontend:
    build: ./frontend
    container_name: iip_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - iip-network

volumes:
  uploads-volume:

networks:
  iip-network:
    driver: bridge
